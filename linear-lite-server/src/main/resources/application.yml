spring:
  config:
    import: optional:file:.env.properties[.properties]
  application:
    name: linear-lite-server
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:8.148.189.106}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:linear_lite}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Password1!}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:qingfeng_138144@163.com}
    password: ${MAIL_PASSWORD:SUV9SGWAEWM4hixz}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:true}
          socketFactory:
            port: ${MAIL_PORT:465}
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

# CORS：Vite 默认开发地址，多源用逗号分隔
cors:
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# JWT
jwt:
  secret: ${JWT_SECRET:linear-lite-default-secret-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  storage:
    r2:
      enabled: ${R2_ENABLED:false}
      endpoint: ${R2_ENDPOINT:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}
      region: ${R2_REGION:auto}
